apiVersion: apps/v1
kind: Deployment
metadata:
  name: university-management-service
  labels:
    app: university-management-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: university-management-service
  template:
    metadata:
      labels:
        app: university-management-service
    spec:
      containers:
        - name: university-management-service
          image: university-management-service:0.1.0-SNAPSHOT
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: university-management-db
                  key: host
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: university-management-db
                  key: database
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: university-management-db
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: university-management-db
                  key: password
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: university-management-redis
                  key: host
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: university-management-service
spec:
  selector:
    app: university-management-service
  ports:
    - name: http
      port: 80
      targetPort: 8080
