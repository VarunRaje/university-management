services:
  postgres:
    image: postgres:18-alpine
    container_name: university-mgmt-integ-postgres
    environment:
      POSTGRES_DB: university_mgmt
      POSTGRES_USER: university
      POSTGRES_PASSWORD: university
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U university -d university_mgmt"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:8-alpine
    container_name: university-mgmt-integ-redis
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
